  <!-- Author avatar circle -->
  <circle cx="533" cy="590" r="14" fill="#008a44" fill-opacity="0.12" stroke="#008a44" stroke-width="0.8" stroke-opacity="0.4" style="fill:rgb(0, 138, 68);stroke:rgb(0, 138, 68);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="533" y="590" font-family="system-ui, sans-serif" font-size="11" fill="#4ade80" font-weight="500" text-anchor="middle" dominant-baseline="central" style="fill:rgb(74, 222, 128);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:11px;font-weight:500;text-anchor:middle;dominant-baseline:central">CN</text>

