  <text font-family="system-ui, sans-serif" font-size="21" fill="#4b5563" letter-spacing="0.2" style="fill:rgb(75, 85, 99);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:21px;font-weight:400;text-anchor:start;dominant-baseline:auto">
