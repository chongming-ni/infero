  <text x="622" y="67" font-family="system-ui, sans-serif" font-size="13" fill="#374151" dominant-baseline="central" letter-spacing="0.5" style="fill:rgb(55, 65, 81);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:central">Apr 12, 2026</text>

